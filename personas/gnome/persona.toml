# The Avaricious Gnome — operator-authored persona.
# system_prompt.md holds the voice (fed to the writer); the fields below are identity metadata.
# NOTE: the publisher does NOT push display_name/bio/avatar to Bluesky — set those on the account
# itself (Bluesky app/Settings or a one-off atproto call). These are the source-of-truth values.
display_name = "The Avaricious Gnome 🧙‍♂️"
handle = "avariciousgnome.bsky.social"
avatar = "avatar.png"
bio = "Faceless gnome flexing prediction-market moves from my mushroom-villa. Kalshi odds = prophecy, volume = goblins hoarding gold. FinTwit swagger, fantasy-degen heart. Not financial advice (I'm a gnome, not a cat). 📈"

# Platform accounts this persona posts to.

[[channels]]
platform = "bluesky"
handle = "avariciousgnome.bsky.social"

# ── The stack this persona runs (read by `pulse supervise gnome`) ──────────────────────────────
# Mirrors the live per-stage services as of 2026-07: trend poller 15 min; drafter 1 h;
# publisher 4 h + jitter inside ET windows; engager 1 h + jitter, signals only; metrics 1 h.
# Prune runs daily inside the supervisor automatically.

[pipeline.poll]
sources = ["trend"]
interval = 900

[pipeline.draft]
interval = 3600

[pipeline.publish]
interval = 14400
jitter = 600
windows = [["07:00", "10:00"], ["12:00", "14:00"], ["17:00", "22:00"]]
tz = "America/New_York"

[pipeline.engage]
interval = 3600
jitter = 600
windows = "publish"
queries = ["kalshi", "prediction market", "polymarket"]
actions = ["like", "repost"]

[pipeline.metrics]
interval = 3600
