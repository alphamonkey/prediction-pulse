# Example persona — replace with your own brand. The writer uses system_prompt.md (the voice);
# the fields below are identity metadata. NOTE: the pipeline does NOT push display_name/bio/avatar
# to any platform — set those on the account itself.
display_name = "Prediction Pulse"
handle = "example.bsky.social"
avatar = "avatar.png"
bio = "Faceless, data-driven prediction-market moves. Not financial advice."

# ── Channels: the accounts this persona publishes/engages/measures on ──────────────────────────
# Declare one [[channels]] block per account. Publish, engage and metrics all loop these, so
# adding a channel here (plus its secret in secrets/<persona>.env) is the WHOLE change — no code.
# Blocks are validated at load: an unknown platform or a missing required key fails immediately.
#
#   bluesky   keys: handle (optional; falls back to BLUESKY_HANDLE)
#             secret: BLUESKY_APP_PASSWORD
#   mastodon  keys: instance (REQUIRED — no default), handle (optional), max_length (optional;
#             instances configure their own limit)
#             secret: MASTODON_ACCESS_TOKEN  (identifies the account — there is no handle to set)
#
# One draft is written per event and fanned out to every channel, so it is sized to the SMALLEST
# limit among them (Bluesky 300 + Mastodon 500 => 300). Say your target length in system_prompt.md.

[[channels]]
platform = "bluesky"
handle = "example.bsky.social"

# [[channels]]
# platform = "mastodon"
# instance = "https://mastodon.social"   # any Mastodon-compatible server (Pleroma/Akkoma/GoToSocial)
# handle = "@example@mastodon.social"    # optional; used to skip the persona's own posts in engage

# ── The stack this persona runs (read by `pulse supervise <name>`) ─────────────────────────────
# A job runs iff its [pipeline.<job>] section is present; every field is optional and falls back
# to the defaults in pulse/config.py. Delete sections your persona doesn't need — e.g. a
# metrics-only lurker keeps just [pipeline.metrics].

[pipeline.poll]
sources = ["kalshi"]              # content sources: "kalshi" (category allowlist) | "trend"
                                  # (Bluesky-trend-selected) | "generator" (no external input);
                                  # list several to run them all
interval = 900                    # seconds between poll cycles
# jitter = 0                      # max extra random seconds per cycle

# A source that takes options is declared as a table instead (drop `sources =` above — the two
# forms don't mix). "generator" emits your topic seeds as events; the writer invents the post
# in the persona's voice, so no market/API credentials are needed at all:
# [[pipeline.poll.source]]
# type = "generator"
# topics = ["bean history", "bean science"]  # seeds, rotated across buckets; default: 1 generic
# count = 1                        # events per cycle (capped at one per topic per bucket)
# bucket = "1d"                    # dedup granularity ("30m"/"4h"/"1d"): one seed per topic per
#                                  # bucket, so this sets the max posting cadence

[pipeline.draft]
interval = 3600
# limit = 9                       # max events sent to the writer per cycle

[pipeline.publish]
interval = 14400
jitter = 600
# Local ("HH:MM", "HH:MM") pairs in `tz`; end <= start wraps midnight; omit for the global
# default windows. Outward actions only fire inside these windows (dayparting).
windows = [["07:00", "10:00"], ["12:00", "14:00"], ["17:00", "22:00"]]
tz = "America/New_York"
# limit = 1                       # max posts per CYCLE (the daily cap is config.MAX_POSTS_PER_DAY)

[pipeline.engage]
interval = 3600
jitter = 600
windows = "publish"               # alias: reuse this persona's publish windows
queries = ["kalshi", "prediction market", "polymarket"]   # search terms to FIND targets
# allow = [...]                   # relevance allowlist; defaults to `queries`
# deny  = [...]                   # safety denylist; defaults to the global lightning-rod list
actions = ["like", "repost"]      # enabled signals, attempted in order ("follow" is flag-prone)
# caps = { like = 30, repost = 5, follow = 10 }   # rolling-24h per-action caps
# limit = 5                       # candidate targets pulled per cycle

[pipeline.metrics]
interval = 3600
# post_limit = 50                 # recent posts to refresh engagement for each cycle
